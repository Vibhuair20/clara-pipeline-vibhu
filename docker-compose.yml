version: "3.7"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: clara-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./:/workspace  # Mount current repo so n8n can access the python scripts

volumes:
  n8n_data:
